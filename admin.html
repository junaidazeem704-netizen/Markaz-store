<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markaz Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">🛍️ Markaz Admin</div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">View Store ↗</a>
        </div>
    </header>

    <main class="container" style="max-width: 800px; margin: 20px auto; padding: 0 15px;">
        
        <!-- STEP 1: FETCH CJ PRODUCT -->
        <div class="admin-card">
            <h2>🚀 Step 1: Fetch CJ Product Details</h2>
            <div class="form-group">
                <label>CJ Product SKU Code ya PID *</label>
                <input type="text" id="cj-sku-input" placeholder="e.g. CJAM130816105EV">
            </div>
            <button class="wa-btn" onclick="fetchCjProductDetails()" style="width: 100%; margin-top: 10px;">
                🔍 Fetch Product Info
            </button>
        </div>

        <!-- STEP 2: REVIEW & ADD TO STORE (Hidden by default) -->
        <div class="admin-card" id="cj-preview-card" style="display: none; border: 2px solid #818cf8; background: #0b1120; margin-top: 20px;">
            <h2 style="color: #38bdf8;">📦 Step 2: Review & Set Margin</h2>
            
            <!-- Multi Images Preview Gallery -->
            <div style="margin-bottom: 20px;">
                <label style="font-size: 0.9rem; color: #94a3b8; display: block; margin-bottom: 8px;">
                    🖼️ Fetched Images (<span id="cj-img-count" style="color:#38bdf8; font-weight:bold;">0</span> found):
                </label>
                <div id="cj-preview-gallery" style="display: flex; gap: 10px; overflow-x: auto; padding: 10px; border: 1px solid var(--border-light, #334155); border-radius: 8px; background: #070c18;"></div>
            </div>

            <div class="form-group">
                <label>Product Title</label>
                <input type="text" id="cj-p-title">
            </div>

            <div class="flex-row" style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>Cost + Shipping (PKR)</label>
                    <input type="number" id="cj-p-cost" readonly style="background: #1e293b; color: #94a3b8; cursor: not-allowed;">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Profit Margin (%)</label>
                    <input type="number" id="cj-p-margin" value="10" oninput="calculateCjFinalPrice()">
                </div>
            </div>

            <div class="form-group">
                <label>Final Selling Price (PKR)</label>
                <input type="number" id="cj-p-final" style="font-weight: bold; color: #10b981; font-size: 1.1rem; background: #0f172a;">
            </div>

            <div class="form-group">
                <label>Category (Auto-Selected)</label>
                <select id="cj-p-category" class="form-input"></select>
            </div>

            <button class="wa-btn" style="background: #10b981; width: 100%; margin-top: 15px;" onclick="saveCjProductToStore()">
                ✅ Add Product To Store Now
            </button>
        </div>

        <hr style="border-color: #334155; margin: 30px 0;">

        <!-- CATEGORY MANAGEMENT -->
        <div class="admin-card">
            <h2>🏷️ Add Category</h2>
            <div class="form-group">
                <input type="text" id="new-cat-name" placeholder="Category Name (e.g. Watches, Clothing)">
            </div>
            <button class="wa-btn" onclick="addNewCategory()" style="width: 100%; margin-top: 10px;">+ Add Category</button>
            <div id="admin-category-list" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px;"></div>
        </div>

        <!-- MANUAL PRODUCT ADD (MARKAZ) -->
        <div class="admin-card" style="margin-top: 20px;">
            <h2>🛒 Add Manual Product (Markaz)</h2>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="p-title">
            </div>
            <div class="form-group">
                <label>Price (PKR)</label>
                <input type="number" id="p-price">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="p-category"></select>
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="text" id="p-url" placeholder="https://...">
            </div>
            <button class="wa-btn" onclick="addNewProduct()" style="width: 100%; margin-top: 10px;">Save Markaz Product</button>
        </div>

        <!-- STORE PRODUCTS LIST -->
        <div class="admin-card" style="margin-top: 20px;">
            <h2>📋 Store Products</h2>
            <div id="admin-products-list"></div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
