<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Markaz Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🛍️</span>
                <span class="logo-text">Markaz Store</span>
            </a>
        </div>
    </header>

    <!-- Checkout Main Content -->
    <div class="checkout-wrapper">
        
        <a href="index.html" class="back-link">
            <span>←</span> Back to Store
        </a>

        <div class="checkout-card">
            
            <!-- Form Section -->
            <div id="checkout-form-box">
                <h2>Complete Your Order</h2>

                <!-- Product Summary Box -->
                <div class="order-summary-box">
                    <span>Selected Item</span>
                    <h3 id="checkout-product-title">Loading product...</h3>
                    <div class="price-tag" id="checkout-product-price">Rs. 0</div>
                </div>

                <!-- Customer Details Form -->
                <div class="form-group">
                    <label for="c-name">Full Name</label>
                    <input type="text" id="c-name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="c-phone">Phone Number (WhatsApp)</label>
                    <input type="tel" id="c-phone" placeholder="03XXXXXXXXX" required>
                </div>

                <div class="form-group">
                    <label for="c-address">Complete Delivery Address</label>
                    <textarea id="c-address" rows="3" placeholder="House no, street, area, city..." required></textarea>
                </div>

                <button type="button" class="wa-btn btn-whatsapp" onclick="submitOrder()">
                    ✅ Confirm Order
                </button>
            </div>

            <!-- Success Section -->
            <div id="success-box" class="success-card">
                <span class="success-icon">🎉</span>
                <h3>Order Placed Successfully!</h3>
                <p>Aapka order receive ho gaya hai. Hum bohut jald aap se rabta karenge.</p>
                <a href="index.html" class="wa-btn" style="text-decoration: none; display: inline-block;">
                    Continue Shopping
                </a>
            </div>

        </div>
    </div>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
