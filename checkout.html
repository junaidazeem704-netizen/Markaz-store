<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Markaz Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="checkout-page">

    <header class="navbar">
        <div class="logo">🛍️ Markaz Store</div>
        <a href="index.html" class="back-link">← Store</a>
    </header>

    <!-- Normal Checkout Form Box -->
    <div class="checkout-card" id="checkout-form-box">
        <h2>Checkout Order</h2>
        <div class="checkout-summary">
            <h3 id="checkout-product-title">Product Title</h3>
            <p id="checkout-product-price" class="price">Rs. 0</p>
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="c-name" placeholder="Enter full name">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="c-phone" placeholder="e.g. 03001234567">
        </div>

        <div class="form-group">
            <label>Delivery Address</label>
            <textarea id="c-address" placeholder="Complete Street Address, City"></textarea>
        </div>

        <button class="btn-whatsapp" onclick="submitOrder()">
            ✅ Confirm Order
        </button>
    </div>

    <!-- Hidden Success Card (Yeh customer ko order submit hone ke baad dikhega) -->
    <div class="checkout-card" id="success-box" style="display: none; text-align: center; padding: 40px 20px;">
        <div style="font-size: 50px; margin-bottom: 15px;">🎉</div>
        <h2 style="color: var(--whatsapp); margin-bottom: 10px;">Order Placed Successfully!</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">Aapka order successfully register ho gaya hai. Hum jald hi aapse rabta karenge.</p>
        <a href="index.html" class="btn-primary" style="display: block; text-decoration: none; padding: 12px;">Back to Store</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
