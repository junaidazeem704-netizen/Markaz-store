<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Markaz Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: #1f2937;
            color: #fff;
            border-radius: 12px;
        }
        .admin-section {
            margin-bottom: 25px;
            padding: 15px;
            background: #111827;
            border-radius: 8px;
        }
        .admin-section h3 { margin-bottom: 12px; color: #60a5fa; }
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
        .form-group input, .form-group select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #374151;
            background: #1f2937;
            color: #fff;
        }
        .btn-add {
            background: #2563eb;
            color: #fff;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #374151;
        }
        .btn-delete {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2>⚙️ Markaz Store - Admin Dashboard</h2>
        <p><a href="index.html" style="color:#60a5fa;">← Back to Main Store</a></p>
        <hr style="border-color:#374151; margin: 15px 0;">

        <!-- Category Management -->
        <div class="admin-section">
            <h3>1. Add New Category</h3>
            <div class="form-group">
                <input type="text" id="new-cat-name" placeholder="Category Name (e.g. Shoes)">
                <button class="btn-add" onclick="addCategory()">Add Category</button>
            </div>
            <h4>Existing Categories:</h4>
            <div id="categories-manage-list"></div>
        </div>

        <!-- Product Management -->
        <div class="admin-section">
            <h3>2. Add New Product</h3>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="p-title" placeholder="Product Title">
            </div>
            <div class="form-group">
                <label>Price (PKR)</label>
                <input type="number" id="p-price" placeholder="Price">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="p-category"></select>
            </div>
            <div class="form-group">
                <label>Image Upload (File)</label>
                <input type="file" id="p-img-file" accept="image/*">
            </div>
            <div class="form-group">
                <label>OR Image URL</label>
                <input type="text" id="p-img1" placeholder="https://...">
            </div>
            <button class="btn-add" onclick="addProduct()">Save Product</button>

            <h4 style="margin-top:20px;">Existing Products:</h4>
            <div id="admin-products-list"></div>
        </div>

        <!-- System Reset -->
        <div class="admin-section" style="border: 1px solid #ef4444;">
            <h3 style="color:#ef4444;">Danger Zone</h3>
            <button class="btn-delete" onclick="resetStorage()">Reset All Data to Default</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Page load hone par Admin data render karein
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof renderAdminPanels === 'function') {
                renderAdminPanels();
            }
        });
    </script>
</body>
</html>
