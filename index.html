<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markaz Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header Section -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🛍️</span>
                <span class="logo-text">Markaz Store</span>
            </a>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        
        <!-- Category Filter Bar -->
        <nav class="category-bar" id="category-bar">
            <!-- Categories script.js se dynamically load hongi -->
        </nav>

        <!-- Product Grid Section -->
        <section class="products-grid" id="products-container">
            <!-- Products script.js se dynamically load honge -->
        </section>

    </main>

    <!-- Footer Section -->
    <footer class="footer">
        <p>&copy; 2026 Markaz Store. All rights reserved.</p>
    </footer>

    <!-- Main JavaScript File -->
    <script src="script.js"></script>
</body>
</html>
