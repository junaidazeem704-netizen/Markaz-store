<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Preview</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="loadProductDetail()">

    <header class="navbar">
        <a href="index.html" class="nav-btn">← Back to Store</a>
        <span id="detail-source-badge" class="badge-tag">Markaz Verified</span>
    </header>

    <main class="product-detail-container">
        
        <!-- Main Image Container -->
        <div class="main-img-box">
            <img id="detail-main-img" src="" alt="Product Image">
        </div>

        <!-- Thumbnails Gallery -->
        <div id="detail-gallery" class="detail-gallery"></div>

        <!-- Product Information -->
        <div class="detail-info" style="margin-top: 15px;">
            <h1 id="detail-title" style="font-size: 1.25rem; color: #f8fafc; margin-bottom: 10px; line-height: 1.4;">Product Title</h1>
            
            <div class="price-row" style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px;">
                <span id="detail-price" style="font-size: 1.4rem; font-weight: bold; color: #38bdf8;">Rs. 0</span>
                <span id="detail-old-price" style="font-size: 1rem; color: #64748b; text-decoration: line-through;">Rs. 0</span>
            </div>

            <!-- Color Options -->
            <div id="color-variant-box" class="variant-box" style="display: none;">
                <label style="color: #94a3b8; font-size: 0.85rem;">Select Color:</label>
                <div id="color-options" class="variant-options"></div>
            </div>

            <!-- Size Options -->
            <div id="size-variant-box" class="variant-box" style="display: none;">
                <label style="color: #94a3b8; font-size: 0.85rem;">Select Size:</label>
                <div id="size-options" class="variant-options"></div>
            </div>

            <!-- Order Button -->
            <button class="wa-btn" onclick="proceedToCheckoutFromDetail()" style="width: 100%; padding: 15px; font-size: 1.05rem; margin-top: 20px; background: #10b981;">
                ⚡ Buy Now / Order Karein
            </button>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
