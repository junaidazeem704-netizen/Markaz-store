<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markaz Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">🛍️ Markaz Admin</div>
        <div class="nav-links">
            <span style="background: #1e1b4b; color: #818cf8; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;">CONTROL PANEL</span>
            <a href="index.html" class="nav-btn">View Store ↗</a>
        </div>
    </header>

    <main class="container" style="max-width: 650px; margin: 20px auto; padding: 0 15px;">
        
        <!-- STEP 1: FETCH CJ PRODUCT -->
        <div class="admin-card">
            <h2>🚀 Step 1: Fetch CJ Product Details</h2>
            <div class="form-group">
                <label>CJ Product SKU Code *</label>
                <input type="text" id="cj-sku-input" placeholder="e.g. CJAM130816105EV">
            </div>
            <button class="wa-btn" onclick="fetchCjProductDetails()" style="width: 100%; margin-top: 10px;">
                🔍 Fetch Product Info
            </button>
        </div>

        <!-- STEP 2: REVIEW & ADD TO STORE (Hidden initially) -->
        <div class="admin-card" id="cj-preview-card" style="display: none; border: 1px solid #6366f1;">
            <h2 style="color: #818cf8;">📦 Step 2: Review & Set Margin</h2>
            
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.85rem; color: #9ca3af; display: block; margin-bottom: 8px;">
                    🖼️ Fetched Images (<span id="cj-img-count" style="color:#38bdf8;">0</span>):
                </label>
                <div id="cj-preview-gallery" style="display: flex; gap: 8px; overflow-x: auto; padding: 8px; background: #1f2937; border-radius: 10px;"></div>
            </div>

            <div class="form-group" style="margin-bottom: 12px;">
                <label>Product Title</label>
                <input type="text" id="cj-p-title">
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                <div class="form-group" style="flex: 1;">
                    <label>Base Cost (PKR)</label>
                    <input type="number" id="cj-p-cost" readonly style="opacity: 0.7;">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Margin (%)</label>
                    <input type="number" id="cj-p-margin" value="10" oninput="calculateCjFinalPrice()">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 12px;">
                <label>Selling Price (PKR)</label>
                <input type="number" id="cj-p-final" style="color: #34d399; font-weight: bold;">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label>Category</label>
                <select id="cj-p-category"></select>
            </div>

            <button class="wa-btn" style="background: linear-gradient(135deg, #10b981, #059669); width: 100%;" onclick="saveCjProductToStore()">
                ✅ Add Product To Store
            </button>
        </div>

        <!-- CATEGORY MANAGEMENT -->
        <div class="admin-card">
            <h2>🏷️ Add Category</h2>
            <div class="form-group">
                <input type="text" id="new-cat-name" placeholder="Category Name (e.g. Watches, Clothing)">
            </div>
            <button class="wa-btn" onclick="addNewCategory()" style="width: 100%; margin-top: 10px;">+ Add Category</button>
            <div id="admin-category-list" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px;"></div>
        </div>

        <!-- MANUAL PRODUCT ADD -->
        <div class="admin-card">
            <h2>🛒 Add Manual Product (Markaz)</h2>
            <div class="form-group" style="margin-bottom: 10px;">
                <input type="text" id="p-title" placeholder="Title">
            </div>
            <div class="form-group" style="margin-bottom: 10px;">
                <input type="number" id="p-price" placeholder="Price (PKR)">
            </div>
            <div class="form-group" style="margin-bottom: 10px;">
                <select id="p-category"></select>
            </div>
            <div class="form-group" style="margin-bottom: 10px;">
                <input type="text" id="p-url" placeholder="Image URL">
            </div>
            <button class="wa-btn" onclick="addNewProduct()" style="width: 100%;">Save Product</button>
        </div>

        <!-- PRODUCTS LIST -->
        <div class="admin-card">
            <h2>📋 Store Products</h2>
            <div id="admin-products-list"></div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
