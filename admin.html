<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Markaz Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-wrapper { max-width: 800px; margin: 30px auto; padding: 0 15px; }
        .admin-card { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 25px; margin-bottom: 25px; box-shadow: var(--shadow-card); }
        .admin-card h2 { font-family: 'Outfit', sans-serif; color: #818cf8; font-size: 1.3rem; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        .item-list { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px; }
        .list-pill { background: #0d1322; border: 1px solid var(--border-light); padding: 6px 14px; border-radius: var(--radius-full); font-size: 0.85rem; display: flex; align-items: center; gap: 8px; color: var(--text-primary); }
        .btn-delete { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 50%; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; }
        .admin-product-item { display: flex; align-items: center; justify-content: space-between; background: #0f1523; border: 1px solid var(--border-light); padding: 10px 15px; border-radius: var(--radius-md); margin-bottom: 10px; }
        .admin-prod-img { width: 45px; height: 45px; object-fit: cover; border-radius: var(--radius-sm); }
        select.form-input { width: 100%; background: #0f1523; border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 14px 16px; color: var(--text-primary); outline: none; }
        .flex-row { display: flex; gap: 12px; }
        .flex-row .form-group { flex: 1; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">🛍️ Markaz Admin <span class="badge-store">CONTROL PANEL</span></a>
            <a href="index.html" class="back-link" style="margin: 0;">View Store ↗</a>
        </div>
    </header>

    <div class="admin-wrapper">

        <!-- 1. Fetch CJ SKU Step -->
        <div class="admin-card" style="border-color: rgba(99, 102, 241, 0.4); background: linear-gradient(180deg, #121929, #0d1322);">
            <h2>🚀 Step 1: Fetch CJ Product Details</h2>
            <div class="form-group">
                <label for="cj-sku-input">CJ Product SKU Code *</label>
                <input type="text" id="cj-sku-input" placeholder="e.g. CJSJ123456789">
            </div>
            <button class="wa-btn" style="background: linear-gradient(135deg, #6366f1, #4f46e5);" onclick="fetchCjProductDetails()">
                🔍 Fetch Product Info
            </button>
        </div>

        <!-- 2. CJ Product Review & Add Section (Appears after fetch) -->
        <div class="admin-card" id="cj-preview-card" style="display: none; border: 2px solid #818cf8; background: #0b1120;">
            <h2 style="color: #38bdf8;">📦 Step 2: Review & Set Margin</h2>
            
            <div style="text-align: center; margin-bottom: 15px;">
                <img id="cj-preview-img" src="" style="max-width: 140px; height: 140px; object-fit: cover; border-radius: var(--radius-md); border: 1px solid var(--border-light);">
            </div>

            <div class="form-group">
                <label>Product Title</label>
                <input type="text" id="cj-p-title">
            </div>

            <div class="flex-row">
                <div class="form-group">
                    <label>Cost + Shipping (PKR)</label>
                    <input type="number" id="cj-p-cost" readonly style="background: #1e293b; color: #94a3b8; cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label>Profit Margin (%)</label>
                    <input type="number" id="cj-p-margin" value="10" oninput="calculateCjFinalPrice()">
                </div>
            </div>

            <div class="form-group">
                <label>Final Selling Price (PKR)</label>
                <input type="number" id="cj-p-final" style="font-weight: bold; color: #10b981; font-size: 1.1rem; background: #0f172a;">
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="cj-p-category" class="form-input"></select>
            </div>

            <div class="form-group">
                <label>Image Link (URL)</label>
                <input type="text" id="cj-p-image">
            </div>

            <button class="wa-btn" style="background: #10b981;" onclick="saveCjProductToStore()">
                ✅ Add Product To Store Now
            </button>
        </div>

        <!-- 3. Category Manager -->
        <div class="admin-card">
            <h2>🏷️ Add Category</h2>
            <div class="form-group">
                <input type="text" id="new-cat-name" placeholder="Category Name (e.g. Watches, Clothing)">
            </div>
            <button class="wa-btn" style="background: var(--accent-indigo);" onclick="addNewCategory()">+ Add Category</button>

            <h3 style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 15px;">Existing Categories:</h3>
            <div class="item-list" id="admin-category-list"></div>
        </div>

        <!-- 4. Manual Product Manager (Markaz) -->
        <div class="admin-card">
            <h2>📦 Add Manual Product (Markaz)</h2>
            <div class="form-group">
                <input type="text" id="p-title" placeholder="Product Title">
            </div>
            <div class="form-group">
                <input type="number" id="p-price" placeholder="Price (PKR)">
            </div>
            <div class="form-group">
                <select id="p-category" class="form-input"></select>
            </div>
            <div class="form-group">
                <input type="file" id="p-file" accept="image/*">
            </div>
            <div class="form-group">
                <input type="url" id="p-url" placeholder="OR Image URL https://...">
            </div>
            <button class="wa-btn" onclick="addNewProduct()">💾 Save Manual Product</button>
        </div>

        <!-- 5. Existing Products List -->
        <div class="admin-card">
            <h2>🛍️ Existing Store Products</h2>
            <div id="admin-products-list"></div>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof renderAdminPanel === 'function') renderAdminPanel();
        });
    </script>
</body>
</html>
