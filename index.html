<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markaz Store - Premium Storefront</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Shopify Announcement Bar -->
    <div class="announcement-bar">
        ⚡ LIMITED TIME OFFER — FREE DELIVERY ALL OVER PAKISTAN ON ORDERS ABOVE RS. 3000 🚚
    </div>

    <!-- Header Section -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                🛍️ Markaz Store <span class="badge-store">VERIFIED</span>
            </a>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        
        <!-- Category Filter Bar -->
        <nav class="category-bar" id="category-bar">
            <!-- Categories script.js se dynamically load hongi -->
        </nav>

        <!-- Horizontal Product Slider Wrapper -->
        <section class="slider-wrapper">
            <!-- Left Scroll Arrow -->
            <button class="slider-arrow left" onclick="scrollSlider(-300)">❮</button>

            <!-- Product Grid Slider Container -->
            <div class="products-slider" id="products-container">
                <!-- Products script.js se dynamically load honge -->
            </div>

            <!-- Right Scroll Arrow -->
            <button class="slider-arrow right" onclick="scrollSlider(300)">❯</button>
        </section>

    </main>

    <!-- Footer Section -->
    <footer class="footer">
        <p>&copy; 2026 Markaz Store. All rights reserved.</p>
    </footer>

    <!-- Main JavaScript File -->
    <script src="script.js"></script>
</body>
</html>
